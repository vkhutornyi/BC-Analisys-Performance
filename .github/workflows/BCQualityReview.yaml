name: BCQuality Code Review

on:
  pull_request:
    branches: [ 'main' ]
    paths: [ '**.al' ]

concurrency:
  group: bcquality-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  models: read

jobs:
  review:
    name: BCQuality AI Review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run BCQuality Review
        run: node .github/scripts/bcquality-review.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
